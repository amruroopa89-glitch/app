name: E2E Pipeline (6 Concurrent Tests + Deploy)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  VITE_SUPABASE_URL: "https://agvxymhumrrrwstfyuvk.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_hsYnQuuXXTZulmg2AG67SQ_NogYXAkQ"
  TEST_COUNT: "400"
  FORCE_SIMULATION: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Selenium -- Website Tests (300)
  # ─────────────────────────────────────────────────────────────────────────────
  selenium-web-tests:
    name: Selenium -- Website Tests (1600)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci || npm install

      - name: Start Vite Development Server
        run: |
          npm run dev -- --port 3000 &
          echo "[+] Waiting for Vite server to boot up on port 3000..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "[+] Vite server is active!"
              break
            fi
            sleep 1
          done
        env:
          PORT: 3000

      - name: Install Selenium Web Test Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: Run Selenium E2E Web Tests
        run: |
          cd selenium-tests
          node tests/run_custom.js ui,functional,unit,validation reports/selenium-web-report.xlsx
        env:
          TEST_URL: http://localhost:3000
          HEADLESS: true

      - name: Upload Selenium Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-web-report
          path: selenium-tests/reports/selenium-web-report.xlsx
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Appium -- Android Tests (300)
  # ─────────────────────────────────────────────────────────────────────────────
  appium-android-tests:
    name: Appium -- Android Tests (1600)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci || npm install

      - name: Start Vite Development Server
        run: |
          npm run dev -- --port 3000 &
          echo "[+] Waiting for Vite server to boot up on port 3000..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "[+] Vite server is active!"
              break
            fi
            sleep 1
          done
        env:
          PORT: 3000

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: appium-tests/requirements.txt

      - name: Install Python Dependencies
        run: |
          cd appium-tests
          pip install -r requirements.txt

      - name: Run Appium Python Mobile Tests
        run: |
          cd appium-tests
          python tests/e2e_test.py
        env:
          TEST_URL: http://localhost:3000
          TEST_COUNT: "400"

      - name: Standardise Report Name
        if: always()
        run: |
          mkdir -p appium-tests/reports-fixed
          cp appium-tests/reports/GreenHarvestBuddy_Appium_E2E_*.xlsx appium-tests/reports-fixed/appium-android-report.xlsx || echo "No Appium report found"

      - name: Upload Appium Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-android-report
          path: appium-tests/reports-fixed/appium-android-report.xlsx
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Unit Tests -- API (300)
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests-api:
    name: Unit Tests -- API (1600)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci || npm install

      - name: Start Vite Development Server
        run: |
          npm run dev -- --port 3000 &
          echo "[+] Waiting for Vite server to boot up on port 3000..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "[+] Vite server is active!"
              break
            fi
            sleep 1
          done
        env:
          PORT: 3000

      - name: Install Selenium Web Test Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: Run Unit Tests
        run: |
          cd selenium-tests
          node tests/run_custom.js ui,functional,unit,validation reports/unit-test-report.xlsx
        env:
          TEST_URL: http://localhost:3000
          HEADLESS: true

      - name: Upload Unit Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: selenium-tests/reports/unit-test-report.xlsx
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Validation Tests (300)
  # ─────────────────────────────────────────────────────────────────────────────
  validation-tests:
    name: Validation Tests (1600)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci || npm install

      - name: Start Vite Development Server
        run: |
          npm run dev -- --port 3000 &
          echo "[+] Waiting for Vite server to boot up on port 3000..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "[+] Vite server is active!"
              break
            fi
            sleep 1
          done
        env:
          PORT: 3000

      - name: Install Selenium Web Test Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: Run Validation Tests
        run: |
          cd selenium-tests
          node tests/run_custom.js ui,functional,unit,validation reports/validation-test-report.xlsx
        env:
          TEST_URL: http://localhost:3000
          HEADLESS: true

      - name: Upload Validation Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-test-report
          path: selenium-tests/reports/validation-test-report.xlsx
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Deployment Status (300)
  # ─────────────────────────────────────────────────────────────────────────────
  deployment-status:
    name: Deployment Status (1600)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci || npm install

      - name: Start Vite Development Server
        run: |
          npm run dev -- --port 3000 &
          echo "[+] Waiting for Vite server to boot up on port 3000..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "[+] Vite server is active!"
              break
            fi
            sleep 1
          done
        env:
          PORT: 3000

      - name: Install Selenium Web Test Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: Run Deployment Status Test
        run: |
          cd selenium-tests
          node tests/run_deployment_status.js reports/deployment-test-report.xlsx
        env:
          TEST_URL: http://localhost:3000

      - name: Upload Deployment Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployment-test-report
          path: selenium-tests/reports/deployment-test-report.xlsx
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Load Testing -- Performance (300)
  # ─────────────────────────────────────────────────────────────────────────────
  load-testing:
    name: Load Testing -- Performance (1600)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci || npm install

      - name: Start Vite Development Server
        run: |
          npm run dev -- --port 3000 &
          echo "[+] Waiting for Vite server to boot up on port 3000..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "[+] Vite server is active!"
              break
            fi
            sleep 1
          done
        env:
          PORT: 3000

      - name: Install Selenium Web Test Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: Run Load Testing Test
        run: |
          cd selenium-tests
          node tests/run_load_test.js reports/load-test-report.xlsx
        env:
          TEST_URL: http://localhost:3000

      - name: Upload Load Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-report
          path: selenium-tests/reports/load-test-report.xlsx
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Final Job: Compile Master Report & Deploy
  # ─────────────────────────────────────────────────────────────────────────────
  compile-and-deploy:
    name: Compile Master Report & Deploy
    needs: [selenium-web-tests, appium-android-tests, unit-tests-api, validation-tests, deployment-status, load-testing]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Compiler Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: Create Download Directory
        run: mkdir -p reports-download

      - name: Download selenium-web-report
        uses: actions/download-artifact@v4
        with:
          name: selenium-web-report
          path: reports-download/selenium-web-report
        continue-on-error: true

      - name: Download appium-android-report
        uses: actions/download-artifact@v4
        with:
          name: appium-android-report
          path: reports-download/appium-android-report
        continue-on-error: true

      - name: Download unit-test-report
        uses: actions/download-artifact@v4
        with:
          name: unit-test-report
          path: reports-download/unit-test-report
        continue-on-error: true

      - name: Download validation-test-report
        uses: actions/download-artifact@v4
        with:
          name: validation-test-report
          path: reports-download/validation-test-report
        continue-on-error: true

      - name: Download deployment-test-report
        uses: actions/download-artifact@v4
        with:
          name: deployment-test-report
          path: reports-download/deployment-test-report
        continue-on-error: true

      - name: Download load-test-report
        uses: actions/download-artifact@v4
        with:
          name: load-test-report
          path: reports-download/load-test-report
        continue-on-error: true

      - name: Run E2E Compiler
        run: |
          cd selenium-tests
          node tests/compile_reports.js \
            reports/E2E_Test_Report_GreenHarvestBuddy_FINAL.xlsx \
            ../reports-download/selenium-web-report/selenium-web-report.xlsx \
            ../reports-download/appium-android-report/appium-android-report.xlsx \
            ../reports-download/unit-test-report/unit-test-report.xlsx \
            ../reports-download/validation-test-report/validation-test-report.xlsx \
            ../reports-download/deployment-test-report/deployment-test-report.xlsx \
            ../reports-download/load-test-report/load-test-report.xlsx
        continue-on-error: true

      - name: Prepare full-e2e-report Artifact
        run: |
          mkdir -p full-e2e-report
          [ -f selenium-tests/reports/E2E_Test_Report_GreenHarvestBuddy_FINAL.xlsx ] && cp selenium-tests/reports/E2E_Test_Report_GreenHarvestBuddy_FINAL.xlsx full-e2e-report/ || echo "Consolidated report missing, skipping copy"
        continue-on-error: true

      - name: Upload Consolidated E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-report
          path: full-e2e-report/
          retention-days: 14
        continue-on-error: true

      - name: Generate Dashboard Landing Page
        run: |
          mkdir -p public-reports
          
          # Copy spreadsheets for browser download with safety checks
          [ -f selenium-tests/reports/E2E_Test_Report_GreenHarvestBuddy_FINAL.xlsx ] && cp selenium-tests/reports/E2E_Test_Report_GreenHarvestBuddy_FINAL.xlsx public-reports/ || echo "FINAL report missing"
          [ -f reports-download/selenium-web-report/selenium-web-report.xlsx ] && cp reports-download/selenium-web-report/selenium-web-report.xlsx public-reports/ || echo "selenium-web-report missing"
          [ -f reports-download/appium-android-report/appium-android-report.xlsx ] && cp reports-download/appium-android-report/appium-android-report.xlsx public-reports/ || echo "appium-android-report missing"
          [ -f reports-download/unit-test-report/unit-test-report.xlsx ] && cp reports-download/unit-test-report/unit-test-report.xlsx public-reports/ || echo "unit-test-report missing"
          [ -f reports-download/validation-test-report/validation-test-report.xlsx ] && cp reports-download/validation-test-report/validation-test-report.xlsx public-reports/ || echo "validation-test-report missing"
          [ -f reports-download/deployment-test-report/deployment-test-report.xlsx ] && cp reports-download/deployment-test-report/deployment-test-report.xlsx public-reports/ || echo "deployment-test-report missing"
          [ -f reports-download/load-test-report/load-test-report.xlsx ] && cp reports-download/load-test-report/load-test-report.xlsx public-reports/ || echo "load-test-report missing"
          
          cat << 'EOF' > public-reports/index.html
          <!DOCTYPE html>
