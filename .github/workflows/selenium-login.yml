name: Selenium E2E and Appium Mobile CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_count:
        description: "Number of test cases to run (100, 300, or 400)"
        type: choice
        required: false
        default: "400"
        options:
          - "100"
          - "300"
          - "400"

env:
  VITE_SUPABASE_URL: "https://agvxymhumrrrwstfyuvk.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_hsYnQuuXXTZulmg2AG67SQ_NogYXAkQ"
  TEST_COUNT: ${{ github.event.inputs.test_count || '400' }}

jobs:
  selenium-tests:
    name: Selenium E2E Web + API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Frontend Dependencies
        run: |
          npm ci || npm install

      - name: Start Vite Development Server
        run: |
          # Start Vite on port 3000 in background
          npm run dev -- --port 3000 &
          echo "[+] Waiting for Vite server to boot up on port 3000..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "[+] Vite server is active!"
              break
            fi
            sleep 1
          done
        env:
          PORT: 3000

      - name: Install Selenium Web Test Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: Run Selenium E2E Web Tests
        run: |
          cd selenium-tests
          npm test
        env:
          TEST_URL: http://localhost:3000
          HEADLESS: true
          TEST_COUNT: ${{ env.TEST_COUNT }}

      - name: Upload Selenium Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-reports
          path: selenium-tests/reports/
          retention-days: 7

  appium-tests:
    name: Appium Mobile Tests Dry-Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Frontend Dependencies
        run: |
          npm ci || npm install

      - name: Start Vite Development Server
        run: |
          # Start Vite on port 3000 in background
          npm run dev -- --port 3000 &
          echo "[+] Waiting for Vite server to boot up on port 3000..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "[+] Vite server is active!"
              break
            fi
            sleep 1
          done
        env:
          PORT: 3000

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: appium-tests/requirements.txt

      - name: Install Python Dependencies
        run: |
          cd appium-tests
          pip install -r requirements.txt

      - name: Run Appium Python Mobile Tests
        run: |
          cd appium-tests
          python tests/e2e_test.py
        env:
          TEST_URL: http://localhost:3000
          TEST_COUNT: ${{ env.TEST_COUNT }}

      - name: Upload Appium Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-reports
          path: appium-tests/reports/
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    needs: selenium-tests
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Selenium Reports
        uses: actions/download-artifact@v4
        with:
          name: selenium-reports
          path: public-reports

      - name: Generate Landing Page
        run: |
          mkdir -p public-reports
          cat << 'EOF' > public-reports/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Green Harvest Buddy CI Test Reports</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                      background-color: #f4f7f6;
                      color: #333;
                      margin: 0;
                      padding: 40px 20px;
                  }
                  .container {
                      max-width: 800px;
                      margin: 0 auto;
                      background: white;
                      padding: 30px;
                      border-radius: 12px;
                      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                  }
                  h1 {
                      color: #1b5e20;
                      margin-top: 0;
                      border-bottom: 2px solid #a5d6a7;
                      padding-bottom: 10px;
                  }
                  ul {
                      list-style-type: none;
                      padding: 0;
                  }
                  li {
                      background: #e8f5e9;
                      margin: 10px 0;
                      padding: 15px;
                      border-radius: 8px;
                      border-left: 5px solid #2e7d32;
                      display: flex;
                      justify-content: space-between;
                      align-items: center;
                  }
                  a {
                      color: #1565c0;
                      text-decoration: none;
                      font-weight: bold;
                  }
                  a:hover {
                      text-decoration: underline;
                  }
                  .meta {
                      font-size: 0.9em;
                      color: #666;
                      margin-top: 20px;
                      text-align: center;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🌱 Green Harvest Buddy CI Test Reports</h1>
                  <p>Welcome! Below are the generated Excel E2E test reports for the latest CI run.</p>
                  <ul>
          EOF

          # List all generated xlsx files and format them as download links
          cd public-reports
          found=false
          for f in *.xlsx; do
              if [ -f "$f" ]; then
                  echo "            <li><span>📊 $f</span><a href=\"./$f\" download>Download Report</a></li>" >> index.html
                  found=true
              fi
          done
          if [ "$found" = "false" ]; then
              echo "            <li>No report files found.</li>" >> index.html
          fi

          cat << 'EOF' >> index.html
                  </ul>
                  <div class="meta">
                      Auto-deployed by GitHub Actions CI Pipeline.
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Check if GitHub Pages is enabled
        id: check_pages
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          echo "Pages status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Pages
        if: steps.check_pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v4
        with:
          enablement: true
        continue-on-error: true

      - name: Upload Pages Artifact
        if: steps.check_pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-reports
        continue-on-error: true

      - name: Deploy to GitHub Pages
        if: steps.check_pages.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

  generate-report:
    name: Generate SkillSwap Test Report
    needs: [selenium-tests, appium-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download Selenium Reports
        uses: actions/download-artifact@v4
        with:
          name: selenium-reports
          path: reports/selenium
          ignore-on-missing: true

      - name: Download Appium Reports
        uses: actions/download-artifact@v4
        with:
          name: appium-reports
          path: reports/appium
          ignore-on-missing: true

      - name: Create Summary Dashboard
        run: |
          echo "## 🌱 Green Harvest Buddy E2E Test Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Job Name | Test Cases Run | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY

          # Check Selenium status and files
          selenium_cases="0"
          selenium_status="❌ FAILED / SKIPPED"
          if [ -d "reports/selenium" ]; then
              count=$(ls reports/selenium/*.xlsx 2>/dev/null | wc -l)
              if [ "$count" -gt 0 ]; then
                  selenium_status="✅ PASSED"
                  selenium_cases="${{ env.TEST_COUNT }}"
              fi
          fi
          echo "| 🌐 Web (Selenium) | Selenium E2E Web + API Tests | $selenium_cases | $selenium_status |" >> $GITHUB_STEP_SUMMARY

          # Check Appium status and files
          appium_cases="0"
          appium_status="❌ FAILED / SKIPPED"
          if [ -d "reports/appium" ]; then
              count=$(ls reports/appium/*.xlsx 2>/dev/null | wc -l)
              if [ "$count" -gt 0 ]; then
                  appium_status="✅ PASSED"
                  appium_cases="${{ env.TEST_COUNT }}"
              fi
          fi
          echo "| 📱 Mobile (Appium) | Appium Mobile Tests Dry-Run | $appium_cases | $appium_status |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📄 Artifacts Generated" >> $GITHUB_STEP_SUMMARY
          echo "Download full spreadsheets from the **Artifacts** panel above." >> $GITHUB_STEP_SUMMARY
